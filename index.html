<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard SEI</title>

    <link rel="stylesheet" href="style.css" />
</head>
    <script>

window.processosSEI = [];

//////////////////////////////////////////////////////
// STATUS
//////////////////////////////////////////////////////

function criarStatusTag(status) {

    let classe = "status-ok";

    if (
        status.toLowerCase().includes("pendente")
    ) {
        classe = "status-pendente";
    }

    if (
        status.toLowerCase().includes("urgente")
    ) {
        classe = "status-urgente";
    }

    return `
        <span class="status-tag ${classe}">
            ${status}
        </span>
    `;
}

//////////////////////////////////////////////////////
// TABELA
//////////////////////////////////////////////////////

function renderTabela(lista) {

    const tbody =
        document.getElementById(
            "process-table-body"
        );

    tbody.innerHTML = "";

    lista.forEach(proc => {

        const tr =
            document.createElement("tr");

        tr.innerHTML = `
            <td>${proc.numero}</td>
            <td>${proc.assunto}</td>
            <td>${criarStatusTag(proc.status)}</td>
            <td>${proc.data}</td>
        `;

        tbody.appendChild(tr);
    });
}

//////////////////////////////////////////////////////
// CARDS
//////////////////////////////////////////////////////

function atualizarCards(lista) {

    document.getElementById(
        "total-processos"
    ).innerText = lista.length;

    document.getElementById(
        "novos-processos"
    ).innerText =
        lista.filter(
            p => p.novo
        ).length;

    document.getElementById(
        "pendentes-processos"
    ).innerText =
        lista.filter(
            p =>
                p.status
                .toLowerCase()
                .includes("pendente")
        ).length;

    document.getElementById(
        "urgentes-processos"
    ).innerText =
        lista.filter(
            p =>
                p.status
                .toLowerCase()
                .includes("urgente")
        ).length;
}

//////////////////////////////////////////////////////
// RECEBER DO TAMPERMONKEY
//////////////////////////////////////////////////////

window.addEventListener(
    "message",
    (event) => {

        if (
            !event.data
            ||
            event.data.tipo
            !== "SEI_PROCESSOS"
        ) {
            return;
        }

        const lista =
            event.data.dados || [];

        console.log(
            "Recebidos:",
            lista.length
        );

        window.processosSEI = lista;

        renderTabela(lista);

        atualizarCards(lista);

        document.getElementById(
            "status-text"
        ).innerText =
            "Atualizado: "
            + new Date()
            .toLocaleTimeString();
    }
);

//////////////////////////////////////////////////////
// PESQUISA
//////////////////////////////////////////////////////

const input =
    document.getElementById(
        "search-input"
    );

input.addEventListener(
    "input",
    () => {

        const termo =
            input.value.toLowerCase();

        const filtrados =
            window.processosSEI.filter(proc => {

                return (
                    proc.numero
                    .toLowerCase()
                    .includes(termo)

                    ||

                    proc.assunto
                    .toLowerCase()
                    .includes(termo)
                );
            });

        renderTabela(filtrados);
    }
);

console.log(
    "Dashboard pronta"
);

</script>
<body>

    <header class="topbar">
        <h1>Dashboard SEI</h1>

        <div class="status">
            <span class="status-dot"></span>
            <span id="status-text">Aguardando dados...</span>
        </div>
    </header>

    <main class="container">

        <section class="cards">

            <div class="card">
                <h2>Total</h2>
                <p id="total-processos">0</p>
            </div>

            <div class="card">
                <h2>Novos</h2>
                <p id="novos-processos">0</p>
            </div>

            <div class="card">
                <h2>Pendentes</h2>
                <p id="pendentes-processos">0</p>
            </div>

            <div class="card">
                <h2>Urgentes</h2>
                <p id="urgentes-processos">0</p>
            </div>

        </section>

        <section class="table-section">

            <div class="table-header">
                <h2>Lista de Processos</h2>

                <input
                    type="text"
                    id="search-input"
                    placeholder="Pesquisar processo..."
                />
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Número</th>
                        <th>Assunto</th>
                        <th>Status</th>
                        <th>Data</th>
                    </tr>
                </thead>

                <tbody id="process-table-body">

                </tbody>
            </table>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
