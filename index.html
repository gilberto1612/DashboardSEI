<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard SEI</title>

    <link rel="stylesheet" href="style.css" />
</head>

<script>

window.addEventListener(
    "message",
    (event) => {

        //////////////////////////////////////////////////////
        // VERIFICA EVENTO
        //////////////////////////////////////////////////////

        if (
            !event.data ||
            event.data.tipo !== "SEI_PROCESSOS"
        ) {
            return;
        }

        //////////////////////////////////////////////////////
        // DADOS RECEBIDOS
        //////////////////////////////////////////////////////

        const lista =
            event.data.dados || [];

        console.log(
            "Recebidos:",
            lista.length
        );

        //////////////////////////////////////////////////////
        // TOTAL DE PROCESSOS
        //////////////////////////////////////////////////////

        const total =
            document.getElementById(
                "total-processos"
            );

        if (total) {

            total.innerText =
                lista.length;
        }

        //////////////////////////////////////////////////////
        // TABELA
        //////////////////////////////////////////////////////

        const tbody =
            document.getElementById(
                "process-table-body"
            );

        if (!tbody) {

            console.log(
                "Tabela não encontrada"
            );

            return;
        }

        //////////////////////////////////////////////////////
        // LIMPA TABELA
        //////////////////////////////////////////////////////

        tbody.innerHTML = "";

        //////////////////////////////////////////////////////
        // INSERE PROCESSOS
        //////////////////////////////////////////////////////

        lista.forEach(proc => {

            const tr =
                document.createElement("tr");

            tr.innerHTML =
                "<td>" + (proc.numero || "") + "</td>" +
                "<td>" + (proc.assunto || "") + "</td>" +
                "<td>" + (proc.status || "") + "</td>" +
                "<td>" + (proc.data || "") + "</td>";

            tbody.appendChild(tr);
        });

        //////////////////////////////////////////////////////
        // STATUS
        //////////////////////////////////////////////////////

        const status =
            document.getElementById(
                "status-text"
            );

        if (status) {

            status.innerText =
                "Atualizado: "
                + new Date()
                .toLocaleTimeString();
        }
    }
);

console.log(
    "Dashboard pronta"
);

</script>

<body>

    <header class="topbar">
        <h1>Dashboard SEI</h1>

        <div class="status">
            <span class="status-dot"></span>
            <span id="status-text">Aguardando dados...</span>
        </div>
    </header>

    <main class="container">

        <section class="cards">

            <div class="card">
                <h2>Total</h2>
                <p id="total-processos">0</p>
            </div>

            <div class="card">
                <h2>Novos</h2>
                <p id="novos-processos">0</p>
            </div>

            <div class="card">
                <h2>Pendentes</h2>
                <p id="pendentes-processos">0</p>
            </div>

            <div class="card">
                <h2>Urgentes</h2>
                <p id="urgentes-processos">0</p>
            </div>

        </section>

        <section class="table-section">

            <div class="table-header">
                <h2>Lista de Processos</h2>

                <input
                    type="text"
                    id="search-input"
                    placeholder="Pesquisar processo..."
                />
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Número</th>
                        <th>Assunto</th>
                        <th>Status</th>
                        <th>Data</th>
                    </tr>
                </thead>

                <tbody id="process-table-body">

                </tbody>
            </table>

        </section>

    </main>

    <script>

window.name = "SEI_DASHBOARD";

console.log(
    "Dashboard pronta"
);

window.addEventListener(
    "message",
    (event) => {

        if (
            !event.data ||
            event.data.tipo !== "SEI_PROCESSOS"
        ) {
            return;
        }

        const lista =
            event.data.dados || [];

        console.log(
            "Recebidos:",
            lista.length
        );

        //////////////////////////////////////////////////////
        // TOTAL
        //////////////////////////////////////////////////////

        const total =
            document.getElementById(
                "total-processos"
            );

        if (total) {

            total.innerText =
                lista.length;
        }

        //////////////////////////////////////////////////////
        // TABELA
        //////////////////////////////////////////////////////

        const tbody =
            document.getElementById(
                "process-table-body"
            );

        if (!tbody) {
            return;
        }

        tbody.innerHTML = "";

        //////////////////////////////////////////////////////

        lista.forEach(proc => {

            const tr =
                document.createElement("tr");

            tr.innerHTML =
                "<td>" + proc.numero + "</td>" +
                "<td>" + proc.assunto + "</td>" +
                "<td>" + proc.status + "</td>" +
                "<td>" + proc.data + "</td>";

            tbody.appendChild(tr);
        });
    }
);

</script>

</body>
</html>
